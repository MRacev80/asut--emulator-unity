[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage
addopts =
    --cov=bridge
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html
    -v

# Markers
markers =
    unit: fast unit tests, no external dependencies
    integration: requires mock Bridge running on port 8769
    fat: requires CODESYS Control Win V3 running (OPC UA)
